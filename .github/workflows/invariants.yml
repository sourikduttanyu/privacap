name: Privacy invariants

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  no-user-id:
    name: No user_id in code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Grep for user_id
        run: |
          # Fail if user_id appears as a real field, column, or payload key.
          # Intentional occurrences are filtered:
          #   - comment lines containing user_id (// ... user_id, # ... user_id, * user_id)
          #   - the rejection handler in impressions.go that detects and blocks user_id
          #   - docstrings documenting its absence
          RESULT=$(grep -r "user_id" \
            --include="*.go" \
            --include="*.py" \
            --include="*.js" \
            --include="*.ts" \
            --include="*.tsx" \
            --exclude-dir=node_modules \
            --exclude-dir=.git \
            -n . \
            | grep -Ev "//.*user_id|\* .*user_id|#.*user_id|not_accepted|Reject.*user_id|absent|intentional|[Nn]o user_id|must be" \
            || true)

          if [ -n "$RESULT" ]; then
            echo "❌ user_id used as real field/column in source:"
            echo "$RESULT"
            exit 1
          fi

          echo "✅ No improper user_id usage found"

  noise-before-fetch:
    name: Extension noise applied before fetch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify geometricMechanism called before fetch in reporter.js
        run: |
          FILE="extension/src/background/reporter.js"
          NOISE_LINE=$(grep -n "geometricMechanism" $FILE | head -1 | cut -d: -f1)
          FETCH_LINE=$(grep -n "fetch(" $FILE | head -1 | cut -d: -f1)

          if [ -z "$NOISE_LINE" ]; then
            echo "❌ geometricMechanism not found in $FILE"
            exit 1
          fi

          if [ -n "$FETCH_LINE" ] && [ "$NOISE_LINE" -gt "$FETCH_LINE" ]; then
            echo "❌ fetch() on line $FETCH_LINE appears before geometricMechanism on line $NOISE_LINE"
            exit 1
          fi

          echo "✅ geometricMechanism (line $NOISE_LINE) called before fetch (line ${FETCH_LINE:-N/A})"
