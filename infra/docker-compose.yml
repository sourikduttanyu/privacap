version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-privacap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-privacap}
      POSTGRES_DB: ${POSTGRES_DB:-privacap}
    volumes:
      - ./migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-privacap}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - privacap

  redis:
    image: redis:7-alpine
    command: redis-server /etc/redis/redis.conf
    volumes:
      - ./redis.conf:/etc/redis/redis.conf:ro
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - privacap

  budget-manager:
    build:
      context: ../budget-manager
      dockerfile: Dockerfile
    env_file: ../.env.example
    environment:
      DATABASE_URL: postgres://privacap:privacap@postgres:5432/privacap?sslmode=disable
      MAX_EPSILON_PER_WINDOW: ${MAX_EPSILON_PER_WINDOW:-10.0}
      BUDGET_WINDOW_SECONDS: ${BUDGET_WINDOW_SECONDS:-86400}
      PORT: "8081"
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - privacap

  cap-service:
    build:
      context: ../server
      dockerfile: Dockerfile
    env_file: ../.env.example
    environment:
      DATABASE_URL: postgres://privacap:privacap@postgres:5432/privacap?sslmode=disable
      REDIS_URL: redis:6379
      BUDGET_MANAGER_URL: http://budget-manager:8081
      FREQUENCY_CAP: ${FREQUENCY_CAP:-5}
      CAMPAIGN_WINDOW_SECONDS: ${CAMPAIGN_WINDOW_SECONDS:-86400}
      PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      budget-manager:
        condition: service_started
    networks:
      - privacap

  client:
    build:
      context: ../client
      dockerfile: Dockerfile
    env_file: ../.env.example
    environment:
      CAP_SERVICE_URL: http://cap-service:8080
      NOISE_BACKEND: ${NOISE_BACKEND:-diffprivlib}
      DP_EPSILON: ${DP_EPSILON:-1.0}
      TARGET_USERS: ${TARGET_USERS:-1000}
    depends_on:
      cap-service:
        condition: service_started
    networks:
      - privacap
    profiles:
      - simulation

  dashboard:
    build:
      context: ../dashboard
      dockerfile: Dockerfile
    environment:
      VITE_CAP_SERVICE_URL: http://localhost:8080
      VITE_BUDGET_MANAGER_URL: http://localhost:8081
    ports:
      - "3000:80"
    depends_on:
      - cap-service
      - budget-manager
    networks:
      - privacap

networks:
  privacap:
    driver: bridge
